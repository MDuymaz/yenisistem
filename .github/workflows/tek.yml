name: Run Dizigom Scripts

on:
  workflow_dispatch:

jobs:
  run-dizigomjson:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write dizigomjson.py from secret (UTF-8 safe)
        run: |
          python -c "import os; open('dizigomjson.py','w',encoding='utf-8').write(os.environ['DIZIGOMJSON_PY'])"
        env:
          DIZIGOMJSON_PY: ${{ secrets.DIZIGOMJSON_PY }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests lxml aiohttp beautifulsoup4 httpx python-dotenv cloudscraper aiofiles playwright
          playwright install

      - name: Run dizigomjson.py
        run: python dizigomjson.py

      - name: Commit JSON to same repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add *.json
          git commit -m "📄 Dizigom JSON güncellendi [ci skip]" || echo "No changes"
          git push

  run-dizigomyenibolumler:
    runs-on: ubuntu-latest
    needs: run-dizigomjson

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write dizigomyenibolumler.py from secret (UTF-8 safe)
        run: |
          python -c "import os; open('dizigomyenibolumler.py','w',encoding='utf-8').write(os.environ['DIZIGOMYENIBOLUMLER_PY'])"
        env:
          DIZIGOMYENIBOLUMLER_PY: ${{ secrets.DIZIGOMYENIBOLUMLER_PY }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests lxml aiohttp beautifulsoup4 httpx python-dotenv cloudscraper aiofiles playwright
          playwright install

      - name: Run dizigomyenibolumler.py
        run: python dizigomyenibolumler.py

      - name: Clone private M3U repo
        run: |
          git clone https://x-access-token:${{ secrets.M3U_REPO_TOKEN }}@github.com/MDuymaz/m3udosyalari.git

      - name: Copy M3U files
        run: |
          mkdir -p m3udosyalari/dizigom
          cp *.m3u m3udosyalari/dizigom/ || true

      - name: Commit and push M3U files
        run: |
          cd m3udosyalari
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dizigom/*
          git commit -m "📺 Dizigom M3U güncellendi [ci skip]" || echo "No changes"
          git push
